name: Package

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  package:
    name: cargo package --workspace
    if: contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: false

      # `release-plz release --dry-run` does not work reliably for
      # workspace-internal dependency bumps: it skips the actual crates.io
      # upload, so downstream crates cannot resolve the new version of their
      # workspace dependency during packaging.
      # See: https://github.com/release-plz/release-plz/issues/2501
      #
      # `cargo package --workspace` resolves all workspace dependencies
      # locally and validates that every crate can be packaged successfully.
      - name: Validate packaging
        run: cargo package --workspace
